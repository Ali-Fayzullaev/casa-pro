events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    server_tokens off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;
        server_name pro.casa.kz;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name pro.casa.kz;

        # SSL Certificates (will be mounted)
        # ssl_certificate /etc/letsencrypt/live/pro.casa.kz/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/pro.casa.kz/privkey.pem;
        
        # Self-signed placeholder or commented out until certs exist
        # For first run without certs, comment out listen 443 block or ssl directives
        # Below is a safe fallback if certs don't exist yet, but Nginx will fail if files missing.
        # We will assume user runs certbot first or uses a separate setup script.
        # For this template, I'll provide the configuration assuming certs are ready or self-signed generated.
        
        # To make it easy for first run, I will comment SSL out and use port 80 for app initially.
        # USER MUST UNCOMMENT AFTER GETTING CERTS.
    }
    
    # Simple HTTP version for initial setup (before SSL)
    server {
        listen 8080; # Mapped to 80 in docker-compose if SSL not ready, or separate logic
        server_name pro.casa.kz;

        location / {
            proxy_pass http://frontend:3000;
        }

        location /api/ {
            proxy_pass http://backend:3001/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Origin $http_origin;
        }
        
        # MinIO Console Proxy
        location /minio/ {
            proxy_pass http://minio:9001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
